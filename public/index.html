<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Linkly</title>
  <style>
    body { font-family: sans-serif; background: #0a0a0b; color: #fff; padding: 2rem; }
    .container { max-width: 400px; margin: 0 auto; }
    input { width: 100%; padding: 12px; margin: 8px 0; background: #1c1c1f; border: 1px solid #333; color: #fff; border-radius: 8px; }
    button { width: 100%; padding: 12px; background: #22c55e; color: #000; border: none; border-radius: 8px; font-weight: bold; cursor: pointer; }
    .toggle { text-align: center; margin-top: 1rem; color: #888; }
    .toggle a { color: #22c55e; }
        .error { color: #ef4444; margin-top: 1rem; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <h1 style="text-align:center;">Linkly</h1>
    <h2 id="title" style="text-align:center;margin-bottom:1rem;">Sign In</h2>
    
    <input type="email" id="email" placeholder="Email">
    <input type="password" id="password" placeholder="Password">
    <button id="submit">Sign In</button>
    
    <p class="error" id="error"></p>
    
    <p class="toggle">
           <span id="footer">Don't have an account?</span> 
      <a href="#" id="toggle">Sign up</a>
    </p>
  </div>

  <script>
    let isLogin = true;
    const emailEl = document.getElementById('email');
    const passwordEl = document.getElementById('password');
    const submitEl = document.getElementById('submit');
    const titleEl = document.getElementById('title');
    const footerEl = document.getElementById('footer');
    const toggleEl = document.getElementById('toggle');
    const errorEl = document.getElementById('error');
       toggleEl.addEventListener('click', (e) => {
      e.preventDefault();
      isLogin = !isLogin;
      titleEl.textContent = isLogin ? 'Sign In' : 'Sign Up';
      submitEl.textContent = isLogin ? 'Sign In' : 'Sign Up';
      footerEl.textContent = isLogin ? "Don't have an account?" : "Already have an account?";
      toggleEl.textContent = isLogin ? 'Sign up' : 'Sign in';
    });

    submitEl.addEventListener('click', async () => {
      const email = emailEl.value;
      const password = passwordEl.value;
      const endpoint = isLogin ? '/api/auth/login' : '/api/auth/register';
      
      const res = await fetch(endpoint, {
             method: 'POST',
        headers: { 'Content-Type': 'application/json' },
        body: JSON.stringify({ email, password })
      });
      
      const data = await res.json();
      
      if (!res.ok) {
        errorEl.textContent = data.error;
        errorEl.style.display = 'block';
        return;
      }
      
      localStorage.setItem('linkly_token', data.token);
      alert('Logged in! Token: ' + data.token.substring(0, 20) + '...');
          });
  </script>
</body>
</html>
